<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030c12"/>
      <stop offset="100%" stop-color="#072030"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#088395" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Border -->
  <rect width="62" height="62" x="1" y="1" rx="11" fill="none" stroke="#088395" stroke-width="1.5" stroke-opacity="0.55"/>

  <!-- Corner glow -->
  <circle cx="4" cy="4" r="18" fill="#088395" fill-opacity="0.18" filter="url(#glow)"/>

  <!-- "MinDev" text -->
  <text
    x="32"
    y="33"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-weight="900"
    font-size="15"
    letter-spacing="-0.5"
    fill="#EBF4F6"
  >MinDev</text>

  <!-- "<>" text -->
  <text
    x="32"
    y="47"
    text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-weight="900"
    font-size="14"
    letter-spacing="1"
    fill="#088395"
  >&lt;&gt;</text>

  <!-- Bottom shimmer line -->
  <rect x="0" y="62" width="64" height="2" rx="1" fill="url(#shimmer)"/>
</svg>
